<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Econômico</title>
    <style>
        body {
            background-color: #0d1117; /* Fundo escuro */
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background-color: #161b22;
            padding: 20px;
            border-radius: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas */
            gap: 15px;
        }
        .card {
            background-color: #21262d;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #30363d;
        }
        .card h3 { margin: 0; font-size: 0.8rem; color: #8b949e; }
        .card p { margin: 10px 0 0; font-size: 1.2rem; font-weight: bold; }
        .positive { color: #3fb950; } /* Verde para subida */
        .negative { color: #f85149; } /* Vermelho para descida */
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Painel Econômico Brasil</h2>
        <span>00:47:22</span>
    </div>

    <div class="grid">
        <!-- Exemplo de Cards -->
        <div class="card">
            <h3>IBOV</h3>
            <p class="positive">1.24% ↑</p>
        </div>
        <div class="card">
            <h3>DÓLAR</h3>
            <p class="negative">0.52% ↓</p>
        </div>
        <div class="card">
            <h3>SELIC</h3>
            <p>10.75%</p>
        </div>
        <div class="card">
            <h3>IPCA</h3>
            <p class="positive">4.50%</p>
        </div>
    </div>
</div>

</body>
</html>
