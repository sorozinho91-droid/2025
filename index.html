<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        .container { max-width: 450px; margin: 10px auto; font-family: sans-serif; border: 1px solid #d1d4dc; border-radius: 8px; overflow: hidden; }
        .header { background: #131722; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; }
        .vies { background: #fffbe6; padding: 12px; font-size: 13px; border-top: 1px solid #d1d4dc; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🌍 FASE 1: CENÁRIO GLOBAL</div>
    
    <!-- Widget Simples (Tipo Lista) - Mais leve e difícil de bloquear -->
    <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://www.tradingview-widget.com" style="width: 100%; height: 400px;"></iframe>

    <div class="vies">
        <strong>💡 RESUMO DE VIÉS:</strong><br>
        🟢 Mundo + Commodities + DXY 🔴 = 🚀 COMPRA<br>
        🔴 Mundo + Commodities + DXY 📈 = 📉 VENDA<br>
        ⚪ Misto + Sem Notícias = ↔️ LATERALIDADE
    </div>
</div>

</body>
</html>
