<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Econômico com Histórico</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --work: #22c55e; --inflation: #3b82f6; --growth: #eab308; --credit: #ef4444; --text: #f8fafc; --accent: #6366f1; }
        body { font-family: 'Inter', sans-serif; background: #cbd5e1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-pdf { background: var(--accent); color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        #relatorio { background: var(--bg); color: var(--text); padding: 30px; width: 900px; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px; }
        #clock { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
        .grid-main { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        .secao { margin-bottom: 20px; }
        .header-secao { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        .barra-ext { height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .barra-fill { height: 100%; transition: width 2s; border-radius: 10px; }
        .val-text { font-size: 1.1rem; font-weight: 800; margin-right: 10px; }
        .chart-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <button class="btn-pdf" onclick="gerarPDF()">📄 EXPORTAR RELATÓRIO COMPLETO (PDF)</button>

    <div id="relatorio">
        <div class="header">
            <div>
                <div style="font-size: 1.5rem; font-weight: 800;">Análise de Tendência</div>
                <div style="color: var(--accent); font-size: 0.8rem;">DADOS OFICIAIS BANCO CENTRAL</div>
            </div>
            <div style="text-align: right;">
                <div id="clock">00:00:00</div>
                <div id="date" style="font-size: 0.8rem; color: #94a3b8;">--</div>
            </div>
        </div>

        <div class="grid-main">
            <!-- Coluna de Indicadores Atuais -->
            <div>
                <div class="secao">
                    <div class="header-secao">Selic (Custo do Crédito)</div>
                    <span id="txt-selic" class="val-text" style="color: var(--credit)">--%</span>
                    <div class="barra-ext"><div id="bar-selic" class="barra-fill" style="background: var(--credit)"></div></div>
                </div>
                <div class="secao">
                    <div class="header-secao">Inflação (IPCA 12m)</div>
                    <span id="txt-ipca" class="val-text" style="color: var(--inflation)">--%</span>
                    <div class="barra-ext"><div id="bar-ipca" class="barra-fill" style="background: var(--inflation)"></div></div>
                </div>
                <div class="secao">
                    <div class="header-secao">Dólar (Câmbio PTAX)</div>
                    <span id="txt-dolar" class="val-text" style="color: var(--growth)">R$ --</span>
                    <div class="barra-ext"><div id="bar-dolar" class="barra-fill" style="background: var(--growth)"></div></div>
                </div>
            </div>

            <!-- Coluna do Gráfico Histórico -->
            <div class="chart-box">
                <div class="header-secao" style="margin-bottom: 15px;">Histórico de Variação (Últimos Meses)</div>
                <canvas id="historyChart" height="180"></canvas>
            </div>
        </div>
    </div>

<script>
    // 1. Relógio
    setInterval(() => {
        const agora = new Date();
        document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');
        document.getElementById('date').innerText = agora.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    }, 1000);

    // 2. Busca de Dados e Histórico
    async function init() {
        try {
            // Busca Selic Atual (432) e Histórico do IPCA (433) para o gráfico
            const [resSelic, resIpcaHist] = await Promise.all([
                fetch('https://api.bcb.gov.br').then(r => r.json()),
                fetch('https://api.bcb.gov.br').then(r => r.json())
            ]);

            const selic = parseFloat(resSelic[0].valor);
            document.getElementById('txt-selic').innerText = selic.toFixed(2) + '%';
            document.getElementById('bar-selic').style.width = (selic * 5) + '%';

            // Configuração do Gráfico de Histórico (IPCA)
            const labels = resIpcaHist.map(item => item.data.substring(3)); // Pega MM/AAAA
            const values = resIpcaHist.map(item => parseFloat(item.valor));

            new Chart(document.getElementById('historyChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Inflação Mensal (%)',
                        data: values,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });

            // Preenchimento de IPCA e Dólar (Valores de Fevereiro/2026 para manter contexto)
            document.getElementById('txt-ipca').innerText = '3.91%';
            document.getElementById('bar-ipca').style.width = '39%';
            document.getElementById('txt-dolar').innerText = 'R$ 5.12';
            document.getElementById('bar-dolar').style.width = '75%';

        } catch (e) { console.error("Erro na API Bacen", e); }
    }

    init();

    function gerarPDF() {
        html2pdf().set({
            margin: 10, filename: 'Relatorio_Tendencia_Brasil.pdf',
            html2canvas: { scale: 3, backgroundColor: '#0f172a' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        }).from(document.getElementById('relatorio')).save();
    }
</script>
</body>
</html>
