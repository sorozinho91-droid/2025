<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 OpControl — Gestão de Operações</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f172a 100%); min-height: 100vh; color: #f1f5f9; }
.wrap { max-width: 1300px; margin: 0 auto; padding: 32px 16px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
.header h1 { font-size: 24px; font-weight: 900; color: #f8fafc; margin: 0; }
.header p { color: #64748b; font-size: 12px; margin-top: 4px; }
.btns { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
select { background: #1e293b; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 9px 14px; font-size: 13px; cursor: pointer; }
.btn { border: none; border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-add { background: linear-gradient(90deg,#6366f1,#818cf8); color: #fff; }
.btn-csv { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3) !important; }
.table-wrap { background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: rgba(255,255,255,0.05); }
th { padding: 13px 14px; color: #94a3b8; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid rgba(255,255,255,0.07); white-space: nowrap; }
th:nth-child(n+4) { text-align: center; }
td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.03); }
td:nth-child(n+4) { text-align: center; }
tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
tr:hover td { background: rgba(99,102,241,0.07) !important; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 6px; font-weight: 800; font-size: 12px; min-width: 54px; text-align: center; }
.badge-pos { background: rgba(34,197,94,0.18); color: #16a34a; }
.badge-neg { background: rgba(239,68,68,0.18); color: #dc2626; }
.badge-neu { background: rgba(148,163,184,0.12); color: #64748b; }
.totals { border-top: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); padding: 16px 24px; display: flex; justify-content: flex-end; gap: 32px; flex-wrap: wrap; }
.totals-label { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
.totals-row { display: flex; gap: 16px; align-items: center; margin-top: 4px; }
.lucro-total { font-weight: 900; font-size: 16px; font-family: monospace; }
.empty { padding: 32px; text-align: center; color: #475569; }
/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.overlay.open { display: flex; }
.modal { background: #1e293b; border-radius: 18px; padding: 32px; width: 100%; max-width: 560px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
.modal h2 { color: #f1f5f9; font-weight: 900; font-size: 18px; margin-bottom: 24px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; }
.form-group input { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 9px 12px; color: #f1f5f9; font-size: 13px; outline: none; width: 100%; }
.modal-btns { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
.btn-cancel { background: transparent; color: #64748b; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-save { background: linear-gradient(90deg,#6366f1,#818cf8); color: #fff; border: none; border-radius: 8px; padding: 10px 28px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-edit { background: rgba(99,102,241,0.15); color: #818cf8; border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: 700; }
.btn-del { background: rgba(239,68,68,0.12); color: #f87171; border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>📈 OpControl</h1>
      <p>Gestão de Operações — Opções</p>
    </div>
    <div class="btns">
      <select id="mesFilter" onchange="renderTable()">
        <option value="todos">Todos os meses</option>
      </select>
      <button class="btn btn-csv" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="btn btn-add" onclick="openModal()">➕ Nova Operação</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Mês</th><th>Desc.</th><th>Opções</th><th>Qtd.</th>
            <th>Data Entrada</th><th>Data Saída</th><th>Vencimento</th>
            <th>P. Entrada</th><th>P. Saída</th><th>Resultado %</th>
            <th>Dias Vcto</th><th>Lucro</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="totals" id="totals" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">➕ Nova Operação</h2>
    <div class="form-grid">
      <div class="form-group"><label>Mês Ref.</label><input id="f_mes_ref" placeholder="mar/26"></div>
      <div class="form-group"><label>Descrição</label><input id="f_descricao" placeholder="1"></div>
      <div class="form-group"><label>Opções *</label><input id="f_opcoes" placeholder="PETRC409W1"></div>
      <div class="form-group"><label>Quantidade *</label><input id="f_quantidade" type="number" placeholder="200"></div>
      <div class="form-group"><label>Data Entrada *</label><input id="f_data_entrada" placeholder="02/03/2026"></div>
      <div class="form-group"><label>Data Saída</label><input id="f_data_saida" placeholder="03/03/2026"></div>
      <div class="form-group"><label>Vencimento</label><input id="f_vencimento" placeholder="13/03/2026"></div>
      <div class="form-group"><label>Preço Entrada *</label><input id="f_preco_entrada" type="number" step="any" placeholder="0.93"></div>
      <div class="form-group"><label>Preço Saída</label><input id="f_preco_saida" type="number" step="any" placeholder="1.39"></div>
      <div class="form-group"><label>Resultado %</label><input id="f_resultado_pct" type="number" step="any" placeholder="49"></div>
      <div class="form-group"><label>Dias Vcto</label><input id="f_dias_vcto" type="number" placeholder="1"></div>
      <div class="form-group"><label>Lucro (R$)</label><input id="f_lucro" type="number" step="any" placeholder="92.00"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveOp()">Salvar</button>
    </div>
  </div>
</div>

<script>
let ops = JSON.parse(localStorage.getItem('opcontrol_ops') || '[]');
let editId = null;

// Dados iniciais de exemplo
if (ops.length === 0) {
  ops = [
    {id: uid(), mes_ref:'mar/26', descricao:'1', opcoes:'PETRC409W1', quantidade:200, data_entrada:'02/03/2026', data_saida:'03/03/2026', vencimento:'', preco_entrada:0.93, preco_saida:1.39, resultado_pct:49, dias_vcto:1, lucro:92},
    {id: uid(), mes_ref:'mar/26', descricao:'1', opcoes:'MGLUO900W1', quantidade:300, data_entrada:'02/03/2026', data_saida:'03/03/2026', vencimento:'', preco_entrada:0.20, preco_saida:0.41, resultado_pct:105, dias_vcto:1, lucro:63},
    {id: uid(), mes_ref:'mar/26', descricao:'1', opcoes:'MGLUO940W1', quantidade:100, data_entrada:'02/03/2026', data_saida:'03/03/2026', vencimento:'', preco_entrada:0.44, preco_saida:0.66, resultado_pct:50, dias_vcto:1, lucro:22},
    {id: uid(), mes_ref:'mar/26', descricao:'1', opcoes:'PETRC422', quantidade:200, data_entrada:'03/03/2026', data_saida:'03/03/2026', vencimento:'', preco_entrada:1.58, preco_saida:1.62, resultado_pct:3, dias_vcto:0, lucro:8},
    {id: uid(), mes_ref:'mar/26', descricao:'1', opcoes:'B3SAC171W2', quantidade:500, data_entrada:'03/03/2026', data_saida:'', vencimento:'13/03/2026', preco_entrada:0.67, preco_saida:null, resultado_pct:-100, dias_vcto:-46084, lucro:-335},
  ];
  save();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function save() { localStorage.setItem('opcontrol_ops', JSON.stringify(ops)); }

function fmtBRL(v) {
  if (v === null || v === undefined || v === '') return '—';
  const abs = Math.abs(v);
  const str = abs.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  return v < 0 ? '-R$ ' + str : 'R$ ' + str;
}

function badge(v) {
  if (v === null || v === undefined || v === '') return '<span style="color:#475569">—</span>';
  const n = Number(v);
  const cls = n > 0 ? 'badge-pos' : n < 0 ? 'badge-neg' : 'badge-neu';
  return '<span class="badge ' + cls + '">' + (n > 0 ? '+' : '') + n + '%</span>';
}

function getFiltered() {
  const m = document.getElementById('mesFilter').value;
  return m === 'todos' ? ops : ops.filter(o => o.mes_ref === m);
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="13" class="empty">Nenhuma operação. Clique em "➕ Nova Operação" para começar.</td></tr>';
    document.getElementById('totals').style.display = 'none';
    return;
  }
  tbody.innerHTML = filtered.map(op => `
    <tr>
      <td style="color:#6366f1;font-weight:700">${op.mes_ref||'—'}</td>
      <td style="color:#cbd5e1">${op.descricao||'—'}</td>
      <td style="color:#f59e0b;font-weight:800;font-family:monospace">${(op.opcoes||'').toUpperCase()}</td>
      <td style="color:#e2e8f0">${op.quantidade?.toLocaleString('pt-BR')||'—'}</td>
      <td style="color:#94a3b8;white-space:nowrap">${op.data_entrada||'—'}</td>
      <td style="color:#94a3b8;white-space:nowrap">${op.data_saida||'<span style="color:#334155">—</span>'}</td>
      <td style="color:#f87171;font-weight:700;white-space:nowrap">${op.vencimento||'<span style="color:#334155">—</span>'}</td>
      <td style="font-family:monospace">${op.preco_entrada != null ? op.preco_entrada.toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</td>
      <td style="font-family:monospace">${op.preco_saida != null ? op.preco_saida.toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—'}</td>
      <td>${badge(op.resultado_pct)}</td>
      <td style="font-family:monospace;color:${op.dias_vcto < 0 ? '#f87171' : '#94a3b8'}">${op.dias_vcto ?? '—'}</td>
      <td style="font-family:monospace;font-weight:800;color:${(op.lucro||0)>=0?'#22c55e':'#ef4444'}">${fmtBRL(op.lucro)}</td>
      <td><div style="display:flex;gap:8px;justify-content:center">
        <button class="btn-edit" onclick="editOp('${op.id}')">✏️</button>
        <button class="btn-del" onclick="deleteOp('${op.id}')">🗑️</button>
      </div></td>
    </tr>
  `).join('');

  const totalLucro = filtered.reduce((a,o) => a+(o.lucro||0), 0);
  const totalRes = filtered.reduce((a,o) => a+(o.resultado_pct||0), 0);
  const mediaRes = Math.round(totalRes / filtered.length);
  const totDiv = document.getElementById('totals');
  totDiv.style.display = 'flex';
  totDiv.innerHTML = `
    <div style="text-align:right">
      <div class="totals-label">Resultado Total</div>
      <div class="totals-row">${badge(totalRes)}<span class="lucro-total" style="color:${totalLucro>=0?'#22c55e':'#ef4444'}">${fmtBRL(totalLucro)}</span></div>
    </div>
    <div style="text-align:right">
      <div class="totals-label">Resultado Médio</div>
      <div style="margin-top:4px">${badge(mediaRes)}</div>
    </div>
  `;
}

function updateMesSelect() {
  const sel = document.getElementById('mesFilter');
  const cur = sel.value;
  const meses = ['todos', ...new Set(ops.map(o => o.mes_ref).filter(Boolean))];
  sel.innerHTML = meses.map(m => `<option value="${m}">${m==='todos'?'Todos os meses':m}</option>`).join('');
  sel.value = meses.includes(cur) ? cur : 'todos';
}

function openModal(op) {
  editId = op ? op.id : null;
  document.getElementById('modalTitle').textContent = op ? '✏️ Editar Operação' : '➕ Nova Operação';
  ['mes_ref','descricao','opcoes','quantidade','data_entrada','data_saida','vencimento','preco_entrada','preco_saida','resultado_pct','dias_vcto','lucro']
    .forEach(k => { document.getElementById('f_'+k).value = op ? (op[k] ?? '') : (k==='mes_ref'?'mar/26':k==='descricao'?'1':''); });
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; }

function saveOp() {
  const get = id => { const v = document.getElementById(id).value; return v === '' ? null : v; };
  const getN = id => { const v = get(id); return v !== null ? Number(v) : null; };
  const payload = {
    mes_ref: get('f_mes_ref'), descricao: get('f_descricao'), opcoes: get('f_opcoes'),
    quantidade: getN('f_quantidade'), data_entrada: get('f_data_entrada'), data_saida: get('f_data_saida'),
    vencimento: get('f_vencimento'), preco_entrada: getN('f_preco_entrada'), preco_saida: getN('f_preco_saida'),
    resultado_pct: getN('f_resultado_pct'), dias_vcto: getN('f_dias_vcto'), lucro: getN('f_lucro'),
  };
  if (!payload.opcoes) { alert('Preencha o campo Opções!'); return; }
  if (editId) {
    const i = ops.findIndex(o => o.id === editId);
    if (i >= 0) ops[i] = { ...ops[i], ...payload };
  } else {
    ops.unshift({ id: uid(), ...payload });
  }
  save(); closeModal(); updateMesSelect(); renderTable();
}

function editOp(id) { openModal(ops.find(o => o.id === id)); }

function deleteOp(id) {
  if (!confirm('Excluir esta operação?')) return;
  ops = ops.filter(o => o.id !== id);
  save(); updateMesSelect(); renderTable();
}

function exportCSV() {
  const filtered = getFiltered();
  const headers = ['Mês','Desc.','Opções','Qtd.','Data Entrada','Data Saída','Vencimento','P. Entrada','P. Saída','Resultado %','Dias Vcto','Lucro'];
  const rows = filtered.map(o => [o.mes_ref||'',o.descricao||'',(o.opcoes||'').toUpperCase(),o.quantidade||'',o.data_entrada||'',o.data_saida||'',o.vencimento||'',o.preco_entrada||'',o.preco_saida||'',o.resultado_pct!=null?o.resultado_pct+'%':'',o.dias_vcto!=null?o.dias_vcto:'',o.lucro!=null?o.lucro:'']);
  const csv = [headers,...rows].map(r=>r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'operacoes.csv'; a.click();
}

document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
updateMesSelect();
renderTable();
</script>
</body>
</html>
