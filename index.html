<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador Econômico Brasil - Real Time</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --up: #4ade80; --down: #f87171; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; }
        .container { width: 100%; max-width: 800px; }
        .header { text-align: center; margin-bottom: 30px; }
        .status-live { background: var(--up); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; animation: blink 1.5s infinite; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .value { font-size: 2.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .trend { font-size: 0.9rem; margin-top: 8px; display: flex; align-items: center; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .positive { color: var(--up); }
        .negative { color: var(--down); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="status-live">● LIVE MARKET</span>
        <h1>Painel de Indicadores Brasil</h1>
        <p style="color: #94a3b8;">Simulação de volatilidade baseada no cenário de Fevereiro/2026</p>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">Taxa Selic</span>
            <div id="selic-val" class="value">15.00%</div>
            <div id="selic-trend" class="trend">Aguardando...</div>
        </div>
        <div class="card">
            <span class="label">Dólar Comercial</span>
            <div id="dolar-val" class="value">R$ 5.12</div>
            <div id="dolar-trend" class="trend">Aguardando...</div>
        </div>
        <div class="card">
            <span class="label">IPCA (Projeção)</span>
            <div id="ipca-val" class="value">3.91%</div>
            <div id="ipca-trend" class="trend">Aguardando...</div>
        </div>
        <div class="card">
            <span class="label">Ibovespa (Pontos)</span>
            <div id="ibov-val" class="value">128.450</div>
            <div id="ibov-trend" class="trend">Aguardando...</div>
        </div>
    </div>
</div>

<script>
    // Configurações iniciais baseadas no seu resumo
    const dados = {
        selic: { val: 15.00, min: 14.75, max: 15.25, dec: 2, unit: '%' },
        dolar: { val: 5.12, min: 5.05, max: 5.30, dec: 2, unit: 'R$ ' },
        ipca: { val: 3.91, min: 3.80, max: 4.10, dec: 2, unit: '%' },
        ibov: { val: 128450, min: 127000, max: 130000, dec: 0, unit: '' }
    };

    function atualizar() {
        for (let key in dados) {
            const config = dados[key];
            const variacao = (Math.random() - 0.5) * (config.val * 0.005); // oscilação de 0.5%
            const novoValor = Math.max(config.min, Math.min(config.max, config.val + variacao));
            
            const diff = novoValor - config.val;
            const elementVal = document.getElementById(`${key}-val`);
            const elementTrend = document.getElementById(`${key}-trend`);

            // Atualiza Texto
            if (key === 'dolar') elementVal.innerText = `R$ ${novoValor.toFixed(2)}`;
            else if (key === 'ibov') elementVal.innerText = Math.floor(novoValor).toLocaleString('pt-BR');
            else elementVal.innerText = `${novoValor.toFixed(2)}%`;

            // Atualiza Tendência Visual
            if (diff > 0) {
                elementTrend.innerHTML = `<span class="positive">▲ +${Math.abs(diff).toFixed(3)}</span>`;
            } else {
                elementTrend.innerHTML = `<span class="negative">▼ -${Math.abs(diff).toFixed(3)}</span>`;
            }

            config.val = novoValor; // Salva o novo valor para a próxima rodada
        }
    }

    // Inicia a atualização a cada 3 segundos
    setInterval(atualizar, 3000);
    atualizar(); // Primeira execução imediata
</script>

</body>
</html>
