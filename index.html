<script>
    // 1. RELÓGIO
    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' });
        }, 1000);
    }

    // 2. BUSCA DE DADOS REAIS
    async function updateData() {
        try {
            // SELIC (BCB)
            const resSelic = await fetch('https://api.bcb.gov.br');
            const dataSelic = await resSelic.json();
            const selicVal = parseFloat(dataSelic[0].valor).toFixed(2);
            document.getElementById('selic').innerText = selicVal + '%';

            // IPCA (IBGE) - Nova lógica de captura
            const resIpca = await fetch('https://servicodados.ibge.gov.br[all]');
            const dataIpca = await resIpca.json();
            // Acessando o valor exato no labirinto da API do IBGE
            const ipcaBruto = dataIpca[0].resultados[0].series[0].serie;
            const ipcaMesAtual = Object.values(ipcaBruto)[0]; 
            document.getElementById('ipca').innerText = ipcaMesAtual + '%';

            // DÓLAR
            const resDolar = await fetch('https://economia.awesomeapi.com.br');
            const dataDolar = await resDolar.json();
            const dolarPrice = parseFloat(dataDolar.USDBRL.bid).toFixed(2);
            document.getElementById('dolar').innerText = 'R$ ' + dolarPrice;
            
            const pctDolar = parseFloat(dataDolar.USDBRL.pctChange);
            document.getElementById('dir-dolar').innerText = pctDolar > 0 ? '▲' : '▼';
            document.getElementById('dir-dolar').style.color = pctDolar > 0 ? 'var(--up)' : 'var(--down)';

            generateMacroAnalysis(parseFloat(ipcaMesAtual), parseFloat(selicVal), dolarPrice);

        } catch (error) {
            console.error("Erro técnico:", error);
            document.getElementById('ipca').innerText = "Erro";
            document.getElementById('macro-text').innerText = "Não foi possível carregar os dados de inflação no momento.";
        }
    }

    function generateMacroAnalysis(ipca, selic, dolar) {
        let texto = `Com o **IPCA em ${ipca}%**, a inflação acumulada nos últimos 12 meses mostra um cenário de atenção. `;
        texto += `A **Selic em ${selic}%** reflete a tentativa do Banco Central de manter os preços sob controle. `;
        texto += `O **Dólar a R$ ${dolar}** influencia diretamente o custo de importados e a inflação futura.`;
        document.getElementById('macro-text').innerHTML = texto;
    }

    startClock();
    updateData();
</script>
